<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <meta name="description" content="Login to your FRGMNT account." />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
    <style>
      :root {
        --login-red: #790101;
        --login-red-dark: #5f0000;
        --login-gray: #d9d9d9;
        --login-text: #222222;
        --login-muted: #777777;
        --login-border: #d0d0d0;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      body {
        min-height: 100vh;
        background: #ffffff;
      }

      .login-hero {
        position: relative;
        isolation: isolate;

        width: 100%;
        min-height: 720px;
        height: calc(100svh - 90px);

        display: flex;
        align-items: center;
        justify-content: center;

        padding: 40px 20px;

        overflow: hidden;
        background: #d8aaaa;
      }

      .login-hero::before {
        content: "";

        position: absolute;
        inset: -35px;
        z-index: 0;

        background-image: url("../assets/images/login.jpg");
        background-position: center center;
        background-size: cover;
        background-repeat: no-repeat;

        filter: blur(22px);
        transform: scale(1.08);
        opacity: 0.78;

        pointer-events: none;
      }

      .login-hero > img {
        position: absolute;
        inset: 0;
        z-index: 1;

        display: block;

        width: 100%;
        height: 100%;

        object-fit: contain;
        object-position: center center;

        pointer-events: none;
        user-select: none;
      }

      .login-hero-overlay {
        position: absolute;
        inset: 0;
        z-index: 2;

        background: rgba(220, 170, 170, 0.38);

        pointer-events: none;
      }

      .login-wrapper {
        position: relative;
        z-index: 3;

        width: 100%;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .login-header {
        width: 100%;
        margin-bottom: 18px;

        text-align: center;
      }

      .login-avatar {
        width: 72px;
        height: 72px;

        display: flex;
        align-items: center;
        justify-content: center;

        margin: 0 auto 10px;

        border-radius: 50%;
        background: #ffffff;

        color: #a0a0a0;
        font-size: 30px;
      }

      .login-title {
        margin: 0 0 8px;

        color: var(--login-text);

        font-family: Arial, Helvetica, sans-serif;
        font-size: 30px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
      }

      .login-subtitle {
        margin: 0;

        color: #000000;

        font-size: 16px;
        font-weight: 400;
        line-height: 1.4;
        text-align: center;
      }

      .login-card {
        width: min(360px, calc(100vw - 32px));

        padding: 28px;

        border-radius: 8px;
        background: var(--login-gray);

        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
      }

      .login-field {
        margin-bottom: 22px;
      }

      .login-label {
        display: block;

        margin-bottom: 5px;

        color: #000000;

        font-size: 11px;
        font-weight: 700;
        line-height: 1.3;
      }

      .login-input {
        width: 100%;
        height: 38px;

        padding: 10px 10px;

        border: none;
        border-radius: 8px;
        outline: none;

        background: #ffffff;
        color: #000000;

        font-size: 12px;
        line-height: 1.3;

        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);

        transition:
          box-shadow 0.2s ease,
          background 0.2s ease;
      }

      .login-input:focus {
        background: #ffffff;

        box-shadow:
          0 0 0 3px rgba(121, 1, 1, 0.15),
          0 2px 7px rgba(0, 0, 0, 0.1);
      }

      .login-input::placeholder {
        color: #aaaaaa;
      }

      .login-field button[type="button"] {
        width: 38px;
        height: 38px;

        display: flex;
        align-items: center;
        justify-content: center;

        padding: 0;

        cursor: pointer;
      }

      .btn-login-submit {
        width: 100%;
        min-height: 40px;

        display: flex;
        align-items: center;
        justify-content: center;

        margin-bottom: 10px;
        padding: 10px 16px;

        border: none;
        border-radius: 10px;

        background: var(--primary, var(--login-red));
        color: #ffffff;

        font-size: 17px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 2px;

        cursor: pointer;

        transition:
          background 0.3s ease,
          transform 0.15s ease,
          box-shadow 0.2s ease;
      }

      .btn-login-submit:hover {
        background: var(--primary-dark, var(--login-red-dark));

        transform: translateY(-1px);

        box-shadow: 0 5px 14px rgba(121, 1, 1, 0.2);
      }

      .btn-login-submit:active {
        transform: translateY(0);
      }

      .login-or {
        position: relative;

        margin: 6px 0 14px;

        color: var(--muted, var(--login-muted));

        font-size: 13px;
        line-height: 1;
        text-align: center;
      }

      .login-or::before,
      .login-or::after {
        content: "";

        position: absolute;
        top: 50%;

        width: 40%;
        height: 2px;

        background: var(--border, var(--login-border));

        transform: translateY(-50%);
      }

      .login-or::before {
        left: 0;
      }

      .login-or::after {
        right: 0;
      }

      .login-register {
        margin: 0;

        color: #555555;

        font-size: 13px;
        line-height: 1.4;
        text-align: center;
      }

      .login-register a {
        color: var(--primary, var(--login-red));

        font-weight: 700;
        text-decoration: none;
      }

      .login-register a:hover {
        color: var(--primary-dark, var(--login-red-dark));
        text-decoration: underline;
      }

      .login-error {
        display: none;

        margin-bottom: 14px;
        padding: 10px 14px;

        border: 1px solid #ffcdd2;
        border-radius: 4px;

        background: #fff5f5;
        color: var(--primary, var(--login-red));

        font-size: 12px;
        line-height: 1.4;
      }

      .login-error.show {
        display: block;
      }

      @media (max-width: 991.98px) {
        .login-hero {
          min-height: 700px;
          height: auto;

          padding: 50px 20px;
        }

        .login-hero > img {
          object-fit: contain;
          object-position: center center;
        }

        .login-card {
          width: min(360px, calc(100vw - 40px));
        }
      }

      @media (max-width: 767.98px) {
        .login-hero {
          min-height: 680px;
          height: auto;

          padding: 38px 16px;
        }

        .login-hero::before {
          inset: -25px;

          filter: blur(18px);
          transform: scale(1.08);
        }

        .login-hero > img {
          object-fit: contain;
          object-position: center center;
        }

        .login-hero-overlay {
          background: rgba(220, 170, 170, 0.4);
        }

        .login-header {
          margin-bottom: 16px;
        }

        .login-avatar {
          width: 66px;
          height: 66px;

          margin-bottom: 9px;

          font-size: 27px;
        }

        .login-title {
          font-size: 27px;
        }

        .login-subtitle {
          padding: 0 10px;

          font-size: 14px;
        }

        .login-card {
          width: min(350px, calc(100vw - 32px));

          padding: 22px;
        }

        .login-field {
          margin-bottom: 20px;
        }

        .btn-login-submit {
          font-size: 16px;
        }
      }

      @media (max-width: 479.98px) {
        .login-hero {
          min-height: 650px;

          padding: 30px 14px;
        }

        .login-hero::before {
          filter: blur(16px);
        }

        .login-avatar {
          width: 62px;
          height: 62px;

          font-size: 25px;
        }

        .login-title {
          font-size: 25px;
        }

        .login-subtitle {
          font-size: 13px;
        }

        .login-card {
          width: min(340px, calc(100vw - 28px));

          padding: 20px;
        }

        .login-field {
          margin-bottom: 18px;
        }

        .login-input {
          height: 37px;
        }

        .btn-login-submit {
          min-height: 38px;

          font-size: 15px;
        }
      }

      @media (max-height: 760px) and (min-width: 768px) {
        .login-hero {
          min-height: 650px;
          height: auto;

          padding-top: 35px;
          padding-bottom: 35px;
        }

        .login-avatar {
          width: 62px;
          height: 62px;

          font-size: 26px;
        }

        .login-card {
          padding: 22px 26px;
        }

        .login-field {
          margin-bottom: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div id="nav-root"></div>

    <section class="login-hero">

      <img src="../assets/images/login.jpg" alt="Fashion background" />
      <div class="login-hero-overlay"></div>

      <div class="login-wrapper">

        <div class="login-header">
          <div class="login-avatar">
            <i class="fas fa-user"></i>
          </div>

          <h1 class="login-title">LOGIN</h1>

          <p class="login-subtitle">
            Welcome back! Please login to your account
          </p>
        </div>

        <div class="login-card">

          <div class="login-error" id="loginError">
            <i class="fas fa-exclamation-circle me-1"></i>
            Incorrect email or password.
          </div>

          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="login-field">
              <label class="login-label" for="loginEmail"> Email </label>

              <input
                class="login-input"
                id="loginEmail"
                type="email"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="login-field">
              <label class="login-label" for="loginPassword"> Password </label>

              <div style="position: relative">
                <input
                  class="login-input"
                  id="loginPassword"
                  type="password"
                  placeholder="Enter your password"
                  required
                  style="padding-right: 45px"
                />

                <button
                  type="button"
                  onclick="togglePass()"
                  style="
                    position: absolute;
                    right: 14px;
                    top: 50%;
                    transform: translateY(-50%);
                    background: none;
                    border: none;
                    color: #888;
                  "
                >
                  <i class="far fa-eye" id="passEyeIcon"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-login-submit">LOGIN</button>
          </form>

          <div class="login-or">or</div>

          <p class="login-register">
            Don't have an account?
            <a href="#">Sign up</a>
          </p>
        </div>
      </div>
    </section>

    <div id="cta-root"></div>

    <div id="footer-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
      function handleLogin(e) {
        e.preventDefault();
        var email = document.getElementById("loginEmail").value;
        var pass = document.getElementById("loginPassword").value;

        if (email && pass.length >= 4) {
          localStorage.setItem("frgmnt_user", JSON.stringify({ email: email }));
          window.location.href = "../index.html";
        } else {
          document.getElementById("loginError").classList.add("show");
        }
      }

      function togglePass() {
        var inp = document.getElementById("loginPassword");
        var icon = document.getElementById("passEyeIcon");
        if (inp.type === "password") {
          inp.type = "text";
          icon.className = "far fa-eye-slash";
        } else {
          inp.type = "password";
          icon.className = "far fa-eye";
        }
      }

      document
        .getElementById("loginEmail")
        .addEventListener("input", function () {
          document.getElementById("loginError").classList.remove("show");
        });
      document
        .getElementById("loginPassword")
        .addEventListener("input", function () {
          document.getElementById("loginError").classList.remove("show");
        });
    </script>
  </body>
</html>
