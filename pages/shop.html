<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop</title>
    <meta
      name="description"
      content="Shop FRGMNT holidays collection, best sellers, tops, bottoms and accessories."
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background: #ffffff;
        color: #111111;
        font-family: Arial, Helvetica, sans-serif;
      }

      img {
        display: block;
        max-width: 100%;
      }

      button,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shop-page,
      .shop-sheet {
        width: 100%;
        min-height: 100vh;
        margin: 0;
        padding: 0;
        background: #ffffff;
      }

      .shop-sheet {
        overflow: hidden;
      }

      .shop-sheet .frgmnt-nav {
        position: relative;
        top: auto;
        z-index: 100;
        width: 100%;
        border: 0 !important;
        border-bottom: 0 !important;
        box-shadow: none !important;
        background: #ffffff;
      }

      .shop-sheet .frgmnt-nav::before,
      .shop-sheet .frgmnt-nav::after {
        display: none !important;
      }

      #nav-root,
      #nav-root > * {
        margin-bottom: 0 !important;
        border: 0 !important;
        border-bottom: 0 !important;
        box-shadow: none !important;
      }

      .shop-main {
        width: 100%;
        padding: 0 55px;
        background: #ffffff;
      }

      .shop-hero {
        position: relative;
        width: 100%;
        overflow: hidden;
        background: #350000;
        user-select: none;
      }

      .hero-track {
        display: flex;
        transition: transform 0.6s cubic-bezier(0.77, 0, 0.18, 1);
        will-change: transform;
      }

      .hero-slide {
        flex: 0 0 100%;
        width: 100%;
      }

      .hero-slide img {
        width: 100%;
        height: auto;
        display: block;
        pointer-events: none;
      }

      .hero-dots {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 10;
      }

      .hero-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255,255,255,0.45);
        border: none;
        cursor: pointer;
        padding: 0;
        transition: background 0.3s, transform 0.3s;
      }

      .hero-dot.active {
        background: #ffffff;
        transform: scale(1.3);
      }

      .hero-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.18);
        color: rgba(255,255,255,0.6);
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: background 0.2s, transform 0.2s, color 0.2s;
        backdrop-filter: blur(4px);
      }

      .hero-arrow:hover {
        background: rgba(255,255,255,0.18);
        color: #fff;
        transform: translateY(-50%) scale(1.08);
      }

      .hero-arrow-prev { left: 18px; }
      .hero-arrow-next { right: 18px; }

      .shop-toolbar {
        width: 100%;
        min-height: 54px;

        display: flex;
        align-items: center;
        justify-content: space-between;

        gap: 20px;
        padding: 0 22px;

        border-bottom: 1px solid #e6e6e6;
        background: #f5f5f5;
      }

      .toolbar-left,
      .toolbar-right,
      .toolbar-tools {
        display: flex;
        align-items: center;
      }

      .toolbar-left {
        gap: 12px;
      }

      .toolbar-right {
        gap: 11px;
      }

      .toolbar-tools {
        gap: 4px;
      }

      .toolbar-filter,
      .toolbar-view {
        border: 0;
        background: transparent;
        color: #222222;
      }

      .toolbar-filter {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 6px 2px;
        font-size: 10px;
        font-weight: 500;
        transition: color 0.2s ease;
      }

      .toolbar-filter:hover {
        color: #990000;
      }

      .toolbar-view {
        width: 26px;
        height: 26px;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        padding: 0;
        font-size: 10px;

        transition:
          color 0.2s ease,
          background-color 0.2s ease;
      }

      .toolbar-view:hover,
      .toolbar-view.active {
        color: #990000;
        background: #ffffff;
      }

      .toolbar-count {
        margin-left: 5px;
        padding-left: 16px;
        border-left: 1px solid #d1d1d1;
        color: #555555;
        font-size: 9px;
        white-space: nowrap;
      }

      .sort-label {
        color: #222222;
        font-size: 9px;
        white-space: nowrap;
      }

      .sort-select {
        width: 138px;
        height: 34px;
        padding: 0 32px 0 14px;
        border: 0;
        outline: none;
        background-color: #ffffff;
        color: #999999;
        font-size: 9px;
        cursor: pointer;
        appearance: none;
      }

      .shop-content {
        width: 100%;

        display: grid;
        grid-template-columns: 205px minmax(0, 1fr);

        gap: 40px;
        padding: 46px 0 50px;
      }

      .shop-content.sidebar-hidden {
        grid-template-columns: minmax(0, 1fr);
      }

      .shop-content.sidebar-hidden .shop-sidebar {
        display: none;
      }

      .shop-sidebar {
        width: 100%;
      }

      .shop-category {
        margin-bottom: 42px;
      }

      .shop-category:last-child {
        margin-bottom: 0;
      }

      .shop-category h2 {
        margin: 0 0 18px;
        color: #000000;
        font-size: 16px;
        font-weight: 800;
        line-height: 1;
        text-transform: uppercase;
      }

      .shop-category button {
        width: 100%;
        display: block;

        margin: 0 0 13px;
        padding: 0;

        border: 0;
        background: transparent;
        color: #222222;

        font-size: 12px;
        font-weight: 400;
        line-height: 1.25;

        text-align: left;
        text-transform: uppercase;

        transition:
          color 0.2s ease,
          transform 0.2s ease;
      }

      .shop-category button:hover,
      .shop-category button.active {
        color: #990000;
      }

      .shop-category button:hover {
        transform: translateX(2px);
      }

      .products-area {
        min-width: 0;
      }

      .products-grid {
        min-width: 0;
        display: grid;
        gap: 28px 22px;
      }

      .products-grid.grid-view {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .products-grid.compact-view {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .products-grid.list-view {
        grid-template-columns: 1fr;
      }

      .shop-product {
        min-width: 0;
        overflow: hidden;
        background: #ededed;
        color: #111111;

        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .shop-product.has-detail {
        cursor: pointer;
      }

      .shop-product:hover {
        transform: translateY(-3px);
        box-shadow: 0 9px 22px rgba(0, 0, 0, 0.08);
      }

      .product-media {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1.06;

        display: flex;
        align-items: center;
        justify-content: center;

        padding: 14px 15px 6px;
        overflow: hidden;
        background: #ededed;
      }

      .product-media img {
        width: 100%;
        height: 100%;

        object-fit: contain;
        object-position: center;

        transition: transform 0.3s ease;
      }

      .shop-product:hover .product-media img {
        transform: scale(1.035);
      }

      .products-grid.list-view .shop-product {
        display: grid;
        grid-template-columns: minmax(240px, 34%) minmax(0, 1fr);
      }

      .products-grid.list-view .product-media {
        aspect-ratio: 1 / 0.7;
      }

      .products-grid.list-view .product-info {
        min-height: 100%;

        display: flex;
        flex-direction: column;
        justify-content: center;

        padding: 28px 60px 28px 28px;
      }

      .products-grid.list-view .product-name {
        font-size: 17px;
      }

      .products-grid.list-view .product-sub {
        margin-bottom: 12px;
        font-size: 11px;
      }

      .products-grid.list-view .product-price {
        font-size: 14px;
      }

      .wish-btn {
        position: absolute;
        top: 11px;
        left: 11px;
        z-index: 4;

        width: 28px;
        height: 28px;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        padding: 0;
        border: 0;
        border-radius: 50%;

        background: transparent;
        color: #ffffff;
        font-size: 14px;

        text-shadow:
          -1px -1px 0 #8d0000,
          1px -1px 0 #8d0000,
          -1px 1px 0 #8d0000,
          1px 1px 0 #8d0000;

        transition:
          color 0.2s ease,
          transform 0.2s ease,
          background-color 0.2s ease,
          text-shadow 0.2s ease;
      }

      .wish-btn:hover {
        color: #990000;
        background: rgba(255, 255, 255, 0.85);
        text-shadow: none;
        transform: scale(1.13);
      }

      .wish-btn.liked {
        color: #990000;
        background: rgba(255, 255, 255, 0.85);
        text-shadow: none;
      }

      .wish-btn i {
        pointer-events: none;
      }

      .product-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 4;

        width: 31px;
        height: 31px;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        border-radius: 50%;

        background: #950000;
        color: #ffffff;

        font-size: 7px;
        font-weight: 800;
        line-height: 1;
        text-transform: capitalize;
      }

      .product-info {
        position: relative;
        min-height: 88px;

        padding: 13px 48px 12px 12px;

        background: #ffffff;
        color: #111111;

        transition:
          background-color 0.25s ease,
          color 0.25s ease;
      }

      .product-name {
        margin: 0 0 4px;
        color: inherit;
        font-size: 11px;
        font-weight: 800;
        line-height: 1.1;
        text-transform: uppercase;
      }

      .product-sub {
        margin: 0 0 7px;
        color: #777777;
        font-size: 8px;
        line-height: 1.1;
        transition: color 0.25s ease;
      }

      .product-price {
        color: inherit;
        font-size: 10px;
        font-weight: 700;
        line-height: 1;
      }

      .shop-product:hover .product-info {
        background: #b65353;
        color: #ffffff;
      }

      .shop-product:hover .product-sub {
        color: rgba(255, 255, 255, 0.88);
      }

      .card-cart {
        position: absolute;
        right: 14px;
        bottom: 14px;

        width: 32px;
        height: 32px;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        padding: 0;
        border: 0;
        border-radius: 50%;

        background: transparent;
        color: #666666;
        font-size: 18px;

        transition:
          color 0.2s ease,
          transform 0.2s ease,
          background-color 0.2s ease;
      }

      .shop-product:hover .card-cart {
        color: #ffffff;
      }

      .card-cart:hover {
        color: #750000 !important;
        background: rgba(255, 255, 255, 0.9);
        transform: scale(1.12);
      }

      .card-cart i {
        pointer-events: none;
      }

      .empty-products {
        display: none;

        min-height: 340px;

        align-items: center;
        justify-content: center;

        text-align: center;

        background: #f7f7f7;
        color: #777777;
      }

      .empty-products.show {
        display: flex;
      }

      .empty-products i {
        display: block;
        margin-bottom: 14px;
        color: #990000;
        font-size: 30px;
      }

      .empty-products h3 {
        margin: 0 0 8px;
        color: #111111;
        font-size: 18px;
        font-weight: 800;
      }

      .empty-products p {
        margin: 0;
        font-size: 12px;
      }

      .shop-pagination {
        width: 100%;

        display: flex;
        align-items: center;
        justify-content: center;

        gap: 18px;
        padding: 8px 0 34px;

        background: #ffffff;
      }

      .pagination-button {
        min-width: 110px;
        height: 42px;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        gap: 7px;
        padding: 0 18px;

        border: 0;
        border-radius: 4px;

        background: #920000;
        color: #ffffff;

        font-size: 14px;
        font-weight: 500;
        line-height: 1;

        transition:
          background-color 0.2s ease,
          transform 0.2s ease;
      }

      .pagination-button:hover:not(:disabled) {
        background: #700000;
        color: #ffffff;
        transform: translateY(-1px);
      }

      .pagination-button:disabled {
        cursor: not-allowed;
        background: #e0e0e0;
        color: #999999;
        opacity: 1;
      }

      .pagination-status {
        min-width: 72px;
        color: #333333;
        font-size: 10px;
        font-weight: 500;
        text-align: center;
      }

      #cta-root,
      #footer-root {
        width: 100%;
      }

      .wishlist-toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 9999;

        min-width: 280px;
        max-width: 380px;

        display: flex;
        align-items: center;
        gap: 12px;

        padding: 14px 16px;

        border-left: 4px solid #920000;
        border-radius: 4px;

        background: #ffffff;
        color: #111111;

        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);

        opacity: 0;
        visibility: hidden;

        transform: translateY(18px);

        pointer-events: none;

        transition:
          opacity 0.25s ease,
          visibility 0.25s ease,
          transform 0.25s ease;
      }

      .wishlist-toast.show {
        opacity: 1;
        visibility: visible;

        transform: translateY(0);
      }

      .wishlist-toast-icon {
        width: 38px;
        height: 38px;

        flex-shrink: 0;

        display: inline-flex;
        align-items: center;
        justify-content: center;

        border-radius: 50%;

        background: #920000;
        color: #ffffff;

        font-size: 14px;
      }

      .wishlist-toast-content {
        min-width: 0;
      }

      .wishlist-toast-title {
        margin: 0 0 3px;

        color: #111111;

        font-size: 13px;
        font-weight: 800;
        line-height: 1.3;
      }

      .wishlist-toast-message {
        margin: 0;

        color: #666666;

        font-size: 11px;
        line-height: 1.45;
      }

      @media (max-width: 991.98px) {
        .shop-main {
          padding-left: 26px;
          padding-right: 26px;
        }

        .shop-hero {
          height: auto;
        }

        .shop-content {
          grid-template-columns: 175px minmax(0, 1fr);
          gap: 28px;
        }

        .products-grid.grid-view,
        .products-grid.compact-view {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 767.98px) {
        .shop-main {
          padding-left: 16px;
          padding-right: 16px;
        }

        .shop-hero {
          height: auto;
        }

        .shop-toolbar {
          align-items: flex-start;
          flex-direction: column;
          padding: 12px 14px;
        }

        .toolbar-left {
          width: 100%;
          flex-wrap: wrap;
        }

        .toolbar-count {
          width: 100%;
          margin-left: 0;
          padding: 3px 0 0;
          border-left: 0;
        }

        .toolbar-right {
          width: 100%;
          justify-content: space-between;
        }

        .shop-content {
          grid-template-columns: 1fr;
          padding-top: 30px;
        }

        .shop-sidebar {
          position: fixed;
          top: 0;
          left: 0;
          width: 280px;
          height: 100vh;
          background: #fff;
          z-index: 9999;
          overflow-y: auto;
          padding: 60px 28px 40px;
          transform: translateX(-100%);
          transition: transform 0.35s cubic-bezier(0.77,0,0.18,1);
          box-shadow: 4px 0 32px rgba(0,0,0,0.12);
        }

        .shop-sidebar.drawer-open {
          transform: translateX(0);
        }

        .sidebar-overlay {
          display: block !important;
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0);
          z-index: 9998;
          pointer-events: none;
          transition: background 0.35s ease;
        }

        .sidebar-overlay.active {
          background: rgba(0,0,0,0.45);
          pointer-events: auto;
        }

        .shop-sidebar-close {
          display: flex !important;
        }

        .products-grid.grid-view,
        .products-grid.compact-view {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .products-grid.list-view .shop-product {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 575.98px) {
        .wishlist-toast {
          right: 16px;
          bottom: 16px;
          left: 16px;

          min-width: 0;
          max-width: none;
        }
      }

      @media (max-width: 479.98px) {
        .shop-hero {
          height: auto;
        }

        .shop-sidebar {
          width: 100%;
          max-width: 320px;
        }

        .products-grid.grid-view,
        .products-grid.compact-view {
          grid-template-columns: 1fr;
        }
      }

      .sidebar-overlay {
        display: none;
      }

      .shop-sidebar-close {
        display: none;
        position: absolute;
        top: 16px;
        right: 16px;
        width: 34px;
        height: 34px;
        border: none;
        background: transparent;
        font-size: 18px;
        cursor: pointer;
        color: #222;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>

  <body>
    <div class="shop-page">
      <div class="shop-sheet">
        <div id="nav-root"></div>

        <main class="shop-main">

          <section class="shop-hero" id="shopHero" aria-label="FRGMNT holidays banner">
            <div class="hero-track" id="heroTrack">
              <div class="hero-slide">
                <img src="../assets/images/shop/banner.png" alt="FRGMNT Holidays – Slide 1" draggable="false" />
              </div>
              <div class="hero-slide">
                <img src="../assets/images/shop/banner1.png" alt="FRGMNT Holidays – Slide 2" draggable="false" />
              </div>
              <div class="hero-slide">
                <img src="../assets/images/shop/banner2.png" alt="FRGMNT Holidays – Slide 3" draggable="false" />
              </div>
            </div>
            <button class="hero-arrow hero-arrow-prev" id="heroPrev" aria-label="Previous slide">
              <i class="fas fa-chevron-left"></i>
            </button>
            <button class="hero-arrow hero-arrow-next" id="heroNext" aria-label="Next slide">
              <i class="fas fa-chevron-right"></i>
            </button>
            <div class="hero-dots" id="heroDots">
              <button class="hero-dot active" data-index="0" aria-label="Slide 1"></button>
              <button class="hero-dot" data-index="1" aria-label="Slide 2"></button>
              <button class="hero-dot" data-index="2" aria-label="Slide 3"></button>
            </div>
          </section>

          <section class="shop-toolbar" aria-label="Shop filters and sorting">
            <div class="toolbar-left">
              <button
                id="filterToggle"
                type="button"
                class="toolbar-filter"
                aria-expanded="true"
              >
                <i class="fa-solid fa-sliders"></i>
                <span>Filter</span>
              </button>

              <div class="toolbar-tools">
                <button
                  id="compactViewButton"
                  type="button"
                  class="toolbar-view"
                  title="Two-column view"
                >
                  <i class="fa-solid fa-grip"></i>
                </button>

                <button
                  id="gridViewButton"
                  type="button"
                  class="toolbar-view active"
                  title="Three-column view"
                >
                  <i class="fa-solid fa-table-cells-large"></i>
                </button>

                <button
                  id="listViewButton"
                  type="button"
                  class="toolbar-view"
                  title="List view"
                >
                  <i class="fa-solid fa-list"></i>
                </button>
              </div>

              <span id="productCount" class="toolbar-count">
                Showing 1-6 of 12 results
              </span>
            </div>

            <div class="toolbar-right">
              <label for="sortProducts" class="sort-label"> Sort by </label>

              <select id="sortProducts" class="sort-select">
                <option value="default">Default</option>
                <option value="newest">Newest</option>
                <option value="low">Price low to high</option>
                <option value="high">Price high to low</option>
                <option value="name">Name A-Z</option>
              </select>
            </div>
          </section>

          <section id="shopContent" class="shop-content">

            <div class="sidebar-overlay" id="sidebarOverlay"></div>

            <aside class="shop-sidebar" id="shopSidebar" aria-label="Shop categories">
              <button class="shop-sidebar-close" id="sidebarClose" aria-label="Close filters"><i class="fas fa-times"></i></button>
              <section class="shop-category">
                <h2>Best Sellers</h2>

                <button type="button" class="active" data-filter="all">
                  All Products
                </button>

                <button type="button" data-filter="new">New Arrivals</button>

                <button type="button" data-filter="summer">
                  "FRGMNT" Summer
                </button>

                <button type="button" data-filter="winter">
                  "FRGMNT" Winter
                </button>

                <button type="button" data-filter="glossy">
                  Glossy. Dewy. Glazed.
                </button>

                <button type="button" data-filter="coming-soon">
                  Coming Soon
                </button>

                <button type="button" data-filter="sale">Sale</button>
              </section>

              <section class="shop-category">
                <h2>Top</h2>

                <button type="button" data-filter="t-shirt">T-Shirt</button>

                <button type="button" data-filter="shirt">Shirt</button>

    <script src="../assets/js/main.js"></script>

    <script>

        {

        },

        {

          badge: "",

        },

        {

        {

          img: "../assets/images/shop/product/DRIFT_JACKET.jpg",
          badge: "",

          tags: ["winter", "hoodie"],
        },

        {
          id: "p11",
          name: "CORE BOMBER",
          sub: "In 5 colors",
          price: 200,
          img: "../assets/images/shop/product/CORE_BOMBER.png",
          badge: "",
          detailUrl: "",

          tags: ["winter", "hoodie"],
        },

        {
          id: "p12",
          name: "RIVET JACKET",
          sub: "In 5 colors",
          price: 200,
          img: "../assets/images/shop/product/RIVET_JACKET.png",
          badge: "New",
          detailUrl: "",

          tags: ["new", "winter", "coming-soon"],
        },
      ];

      let currentPage = 1;
      let activeFilter = "all";
      let activeSort = "default";

      let displayedProducts = [...shopProducts];

      const productGrid = document.getElementById("productGrid");

      const emptyProducts = document.getElementById("emptyProducts");

      const shopContent = document.getElementById("shopContent");

      const productCount = document.getElementById("productCount");

      const paginationStatus = document.getElementById("paginationStatus");

      const previousPageButton = document.getElementById("previousPageButton");

      const nextPageButton = document.getElementById("nextPageButton");

      const wishlistToast = document.getElementById("wishlistToast");

      const wishlistToastIcon = document.getElementById("wishlistToastIcon");

      const wishlistToastTitle = document.getElementById("wishlistToastTitle");

      const wishlistToastMessage = document.getElementById(
        "wishlistToastMessage",
      );

      let wishlistToastTimer;

      function showWishlistToast(productName, wasAdded) {
        clearTimeout(wishlistToastTimer);

        wishlistToastTitle.textContent = wasAdded
          ? "Added to wishlist"
          : "Removed from wishlist";

        wishlistToastMessage.textContent = wasAdded
          ? `${productName} has been added to your wishlist.`
          : `${productName} has been removed from your wishlist.`;

        wishlistToastIcon.className = wasAdded
          ? "fa-solid fa-heart"
          : "fa-solid fa-heart-crack";

        wishlistToast.classList.remove("show");

        void wishlistToast.offsetWidth;

        wishlistToast.classList.add("show");

        wishlistToastTimer = setTimeout(() => {
          wishlistToast.classList.remove("show");
        }, 2500);
      }

      function readWishlist() {
        try {
          const saved = localStorage.getItem(WISHLIST_STORAGE_KEY);

          const parsed = saved ? JSON.parse(saved) : [];

          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          console.error("Cannot read wishlist:", error);

          return [];
        }
      }

      function saveWishlist(products) {
        localStorage.setItem(WISHLIST_STORAGE_KEY, JSON.stringify(products));
      }

      function getSelectedWishlistIds() {
        return new Set(readWishlist().map((product) => product.id));
      }

      function findShopProduct(productId) {
        return shopProducts.find((product) => product.id === productId);
      }

      function applyFilterAndSort() {
        let result;

        if (activeFilter === "all") {
          result = [...shopProducts];
        } else {
          result = shopProducts.filter((product) =>
            product.tags.includes(activeFilter),
          );
        }

        switch (activeSort) {
          case "newest":
            result.reverse();
            break;

          case "low":
            result.sort((first, second) => first.price - second.price);
            break;

          case "high":
            result.sort((first, second) => second.price - first.price);
            break;

          case "name":
            result.sort((first, second) =>
              first.name.localeCompare(second.name),
            );
            break;

          default:
            break;
        }

        displayedProducts = result;
        currentPage = 1;

        renderShopProducts();
      }

      function getTotalPages() {
        return Math.max(1, Math.ceil(displayedProducts.length / pageSize));
      }

      function getCurrentPageProducts() {
        const startIndex = (currentPage - 1) * pageSize;

        return displayedProducts.slice(startIndex, startIndex + pageSize);
      }

      function renderShopProducts() {
        const selectedWishlistIds = getSelectedWishlistIds();

        const currentProducts = getCurrentPageProducts();

        const hasProducts = currentProducts.length > 0;

        productGrid.style.display = hasProducts ? "grid" : "none";

        emptyProducts.classList.toggle("show", !hasProducts);

        productGrid.innerHTML = currentProducts
          .map((product) => {
            const isLiked = selectedWishlistIds.has(product.id);

            return `
              <article
                class="
                  shop-product
                  ${product.detailUrl ? "has-detail" : ""}
                "
                ${
                  product.detailUrl
                    ? `onclick="window.location.href='${product.detailUrl}'"`
                    : ""
                }
              >

                <div class="product-media">

                  <button
                    type="button"
                    class="
                      wish-btn
                      ${isLiked ? "liked" : ""}
                    "
                    aria-label="${
                      isLiked
                        ? `Remove ${product.name} from wishlist`
                        : `Add ${product.name} to wishlist`
                    }"
                    onclick="
                      event.stopPropagation();
                      toggleProductWish('${product.id}');
                    "
                  >

                    <i
                      class="
                        ${isLiked ? "fa-solid" : "fa-regular"}
                        fa-heart
                      "
                    ></i>

                  </button>

                  ${
                    product.badge
                      ? `
                        <span class="product-badge">
                          ${product.badge}
                        </span>
                      `
                      : ""
                  }

                  <img
                    src="${product.img}"
                    alt="${product.name}"
                    loading="lazy"
                  >

                </div>

                <div class="product-info">

                  <h3 class="product-name">
                    ${product.name}
                  </h3>

                  <p class="product-sub">
                    ${product.sub}
                  </p>

                  <div class="product-price">
                    $${product.price}
                  </div>

                  <button
                    type="button"
                    class="card-cart"
                    aria-label="Add ${product.name} to cart"
                    onclick="
                      event.stopPropagation();
                      addProductCart('${product.id}');
                    "
                  >
                    <i class="fa-solid fa-cart-shopping"></i>
                  </button>

                </div>

              </article>
            `;
          })
          .join("");

        updatePagination();
      }

      function updatePagination() {
        const totalPages = getTotalPages();

        const firstProduct =
          displayedProducts.length === 0 ? 0 : (currentPage - 1) * pageSize + 1;

        const lastProduct = Math.min(
          currentPage * pageSize,
          displayedProducts.length,
        );

        productCount.textContent = `Showing ${firstProduct}–${lastProduct} of ${displayedProducts.length} results`;

        paginationStatus.textContent =
          displayedProducts.length === 0
            ? "Page 0 of 0"
            : `Page ${currentPage} of ${totalPages}`;

        previousPageButton.disabled =
          currentPage <= 1 || displayedProducts.length === 0;

        nextPageButton.disabled =
          currentPage >= totalPages || displayedProducts.length === 0;
      }

      function toggleProductWish(productId) {
        const product = findShopProduct(productId);

        if (!product) {
          return;
        }

        const wishlistProducts = readWishlist();

        const existingIndex = wishlistProducts.findIndex(
          (wishlistProduct) => wishlistProduct.id === productId,
        );

        let wasAdded;

        if (existingIndex >= 0) {
          wishlistProducts.splice(existingIndex, 1);

          wasAdded = false;
        } else {
          wishlistProducts.push({
            id: product.id,
            name: product.name,
            price: product.price,
            image: product.img,
            color: "Red",
            size: "M",
            quantity: 1,

            dateAdded: new Date().toLocaleDateString("en-GB", {
              day: "2-digit",
              month: "long",
              year: "numeric",
            }),

            inStock: true,
          });

          wasAdded = true;
        }

        saveWishlist(wishlistProducts);

        renderShopProducts();

        showWishlistToast(product.name, wasAdded);
      }

      function addProductCart(productId) {
        const product = findShopProduct(productId);

        if (!product) {
          return;
        }

        if (typeof addToCart === "function") {
          addToCart(product.id, product.name, product.price, product.img);
        }
      }

      document.querySelectorAll(".shop-category button").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll(".shop-category button").forEach((item) => {
            item.classList.remove("active");
          });

          button.classList.add("active");

          activeFilter = button.dataset.filter || "all";

          applyFilterAndSort();
        });
      });

      document
        .getElementById("filterToggle")
        .addEventListener("click", function () {
          const isMobile = window.innerWidth <= 767;
          if (isMobile) {
            const sidebar = document.getElementById('shopSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('drawer-open');
            overlay.classList.toggle('active');
            this.setAttribute('aria-expanded', String(sidebar.classList.contains('drawer-open')));
          } else {
            const isHidden = shopContent.classList.toggle("sidebar-hidden");
            this.setAttribute("aria-expanded", String(!isHidden));
          }
        });

      document.getElementById('sidebarClose').addEventListener('click', function () {
        document.getElementById('shopSidebar').classList.remove('drawer-open');
        document.getElementById('sidebarOverlay').classList.remove('active');
        document.getElementById('filterToggle').setAttribute('aria-expanded', 'false');
      });

      document.getElementById('sidebarOverlay').addEventListener('click', function () {
        document.getElementById('shopSidebar').classList.remove('drawer-open');
        this.classList.remove('active');
        document.getElementById('filterToggle').setAttribute('aria-expanded', 'false');
      });

      document.querySelectorAll('.shop-sidebar .shop-category button').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (window.innerWidth <= 767) {
            document.getElementById('shopSidebar').classList.remove('drawer-open');
            document.getElementById('sidebarOverlay').classList.remove('active');
          }
        });
      });

      function setProductView(activeButton, viewClass) {
        document.querySelectorAll(".toolbar-view").forEach((button) => {
          button.classList.remove("active");
        });

        activeButton.classList.add("active");

        productGrid.classList.remove("compact-view", "grid-view", "list-view");

        productGrid.classList.add(viewClass);
      }

      document
        .getElementById("compactViewButton")
        .addEventListener("click", function () {
          setProductView(this, "compact-view");
        });

      document
        .getElementById("gridViewButton")
        .addEventListener("click", function () {
          setProductView(this, "grid-view");
        });

      document
        .getElementById("listViewButton")
        .addEventListener("click", function () {
          setProductView(this, "list-view");
        });

      document
        .getElementById("sortProducts")
        .addEventListener("change", function () {
          activeSort = this.value;

          applyFilterAndSort();
        });

      previousPageButton.addEventListener("click", () => {
        if (currentPage <= 1) {
          return;
        }

        currentPage -= 1;

        renderShopProducts();

        document.querySelector(".shop-toolbar").scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      });

      nextPageButton.addEventListener("click", () => {
        if (currentPage >= getTotalPages()) {
          return;
        }

        currentPage += 1;

        renderShopProducts();

        document.querySelector(".shop-toolbar").scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      });

      window.addEventListener("storage", (event) => {
        if (event.key === WISHLIST_STORAGE_KEY) {
          renderShopProducts();
        }
      });

      window.addEventListener("pageshow", () => {
        renderShopProducts();
      });

      applyFilterAndSort();
    </script>

    <script>
      (function () {
        var track = document.getElementById('heroTrack');
        var dots = document.querySelectorAll('.hero-dot');
        var total = 3;
        var current = 0;
        var autoTimer = null;
        var dragStartX = 0;
        var dragDelta = 0;
        var dragging = false;

        function goTo(index) {
          current = (index + total) % total;
          track.style.transition = 'transform 0.6s cubic-bezier(0.77,0,0.18,1)';
          track.style.transform = 'translateX(-' + (current * 100) + '%)';
          dots.forEach(function (d, i) {
            d.classList.toggle('active', i === current);
          });
        }

        function next() { goTo(current + 1); }

        function startAuto() {
          stopAuto();
          autoTimer = setInterval(next, 4000);
        }

        function stopAuto() {
          if (autoTimer) clearInterval(autoTimer);
        }

        dots.forEach(function (dot) {
          dot.addEventListener('click', function () {
            goTo(parseInt(this.dataset.index));
            stopAuto();
            startAuto();
          });
        });

        document.getElementById('heroPrev').addEventListener('click', function () {
          goTo(current - 1);
          stopAuto();
          startAuto();
        });

        document.getElementById('heroNext').addEventListener('click', function () {
          goTo(current + 1);
          stopAuto();
          startAuto();
        });

        var hero = document.getElementById('shopHero');

        hero.addEventListener('touchstart', function (e) {
          dragStartX = e.touches[0].clientX;
          dragDelta = 0;
          track.style.transition = 'none';
          stopAuto();
        }, { passive: true });

        hero.addEventListener('touchmove', function (e) {
          dragDelta = e.touches[0].clientX - dragStartX;
          track.style.transform = 'translateX(calc(-' + (current * 100) + '% + ' + dragDelta + 'px))';
        }, { passive: true });

        hero.addEventListener('touchend', function () {
          if (dragDelta < -50) goTo(current + 1);
          else if (dragDelta > 50) goTo(current - 1);
          else goTo(current);
          startAuto();
        });

        startAuto();
      })();
    </script>
