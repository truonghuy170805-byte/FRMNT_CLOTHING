<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>View Order - FRGMNT</title>

  <meta
    name="description"
    content="Review your FRGMNT order details."
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  >

  <link
    rel="stylesheet"
    href="../assets/css/style.css"
  >

  <link
    rel="stylesheet"
    href="../assets/css/responsive.css"
  >

  <style>
    :root {
      --order-red: #920000;
      --order-text: #111111;
      --order-muted: #666666;
      --order-line: #777777;
      --page-background: #f3f3f3;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;

      background:
        var(--page-background);
    }

    body {
      margin: 0;

      min-height: 100vh;

      padding:
        34px 0 50px;

      overflow-x: hidden;

      background:
        var(--page-background);

      color:
        var(--order-text);

      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }

    img {
      display: block;

      max-width: 100%;
    }

    a {
      color: inherit;

      text-decoration: none;
    }

    button {
      font: inherit;

      cursor: pointer;
    }

    .view-order-page {
      width:
        calc(100% - 116px);

      max-width:
        1280px;

      margin:
        0 auto;

      background:
        #ffffff;
    }

    .view-order-sheet {
      width:
        100%;

      background:
        #ffffff;
    }

    #nav-root,
    #nav-root > * {
      width:
        100%;

      margin-bottom:
        0 !important;
    }

    .view-order-page .frgmnt-nav {
      position:
        relative;

      width:
        100%;

      border:
        0 !important;

      border-bottom:
        0 !important;

      box-shadow:
        none !important;

      background:
        #ffffff;
    }

    .view-order-page .frgmnt-nav::before,
    .view-order-page .frgmnt-nav::after {
      display:
        none !important;
    }

    .view-order-accent {
      width:
        100%;

      height:
        24px;

      background:
        var(--order-red);
    }

    .view-order-main {
      width:
        100%;

      padding:
        0
        42px
        34px;

      background:
        #ffffff;
    }

    .view-order-content {
      width:
        100%;

      min-height:
        455px;

      margin:
        0;

      padding-top:
        34px;
    }

    .delivery-copy {
      margin:
        0
        0
        25px;

      color:
        #252525;

      font-size:
        15px;

      font-weight:
        400;

      line-height:
        1.4;
    }

    .customer-summary {
      width:
        100%;

      display:
        grid;

      gap:
        2px;
    }

    .customer-row {
      display:
        grid;

      grid-template-columns:
        62px
        14px
        minmax(0, 1fr);

      align-items:
        start;

      min-height:
        21px;

      color:
        var(--order-red);

      font-size:
        17px;

      line-height:
        1.35;
    }

    .customer-label,
    .customer-separator {
      font-weight:
        600;
    }

    .customer-value {
      min-width:
        0;

      color:
        #222222;

      font-size:
        15px;

      font-weight:
        400;

      overflow-wrap:
        anywhere;
    }

    .order-table {
      width:
        100%;

      margin-top:
        42px;
    }

    .order-table-head {
      width:
        100%;

      display:
        grid;

      grid-template-columns:
        minmax(0, 1fr)
        170px;

      align-items:
        end;

      gap:
        38px;

      padding:
        0
        7px
        13px;
    }

    .order-table-head h2 {
      margin:
        0;

      color:
        var(--order-red);

      font-size:
        17px;

      font-weight:
        500;

      line-height:
        1.2;
    }

    .order-table-head h2:last-child {
      text-align:
        right;
    }

    .order-table-body {
      width:
        100%;

      display:
        grid;

      grid-template-columns:
        minmax(0, 1fr)
        170px;

      gap:
        38px;
    }

    .order-items {
      min-width:
        0;
    }

    .order-item {
      width:
        100%;

      display:
        grid;

      grid-template-columns:
        82px
        minmax(0, 1fr);

      align-items:
        center;

      gap:
        18px;

      min-height:
        92px;

      padding:
        4px;
    }

    .order-item + .order-item {
      border-top:
        1px solid #eeeeee;
    }

    .order-item-image {
      width:
        72px;

      height:
        72px;

      display:
        flex;

      align-items:
        center;

      justify-content:
        center;

      overflow:
        hidden;

      border-radius:
        6px;

      background:
        #eeeeee;
    }

    .order-item-image img {
      width:
        100%;

      height:
        100%;

      object-fit:
        contain;

      object-position:
        center;
    }

    .order-item-copy {
      min-width:
        0;

      display:
        flex;

      flex-direction:
        column;

      align-items:
        flex-start;

      justify-content:
        center;
    }

    .order-item-name {
      margin:
        0
        0
        10px;

      color:
        #171717;

      font-size:
        13px;

      font-weight:
        400;

      line-height:
        1.3;

      text-transform:
        capitalize;
    }

    .order-item-calculation {
      width:
        100%;

      max-width:
        260px;

      display:
        grid;

      grid-template-columns:
        20px
        18px
        28px
        18px
        48px;

      align-items:
        center;

      justify-items:
        start;

      column-gap:
        18px;

      color:
        #111111;

      font-size:
        11px;

      white-space:
        nowrap;
    }

    .order-item-calculation strong {
      font-size:
        11px;

      font-weight:
        700;
    }

    .order-summary {
      align-self:
        start;

      width:
        100%;

      padding-top:
        5px;
    }

    .summary-row {
      width:
        100%;

      display:
        grid;

      grid-template-columns:
        1fr
        auto;

      align-items:
        center;

      gap:
        12px;

      margin-bottom:
        16px;

      color:
        #222222;

      font-size:
        11px;

      line-height:
        1.3;
    }

    .summary-value {
      min-width:
        38px;

      text-align:
        right;
    }

    .summary-row.total {
      align-items:
        end;

      margin:
        0;
    }

    .summary-row.total .summary-value {
      color:
        var(--order-red);

      font-size:
        24px;

      font-weight:
        400;

      line-height:
        1;
    }

    .order-rule {
      width:
        100%;

      height:
        1px;

      margin-top:
        20px;

      background:
        var(--order-line);
    }

    .continue-row {
      width:
        100%;

      display:
        flex;

      justify-content:
        center;

      padding-top:
        28px;
    }

    .continue-shopping {
      min-width:
        222px;

      height:
        49px;

      display:
        inline-flex;

      align-items:
        center;

      justify-content:
        center;

      gap:
        10px;

      padding:
        0
        26px;

      border:
        1px solid var(--order-red);

      border-radius:
        0;

      background:
        var(--order-red);

      color:
        #ffffff;

      font-size:
        14px;

      font-weight:
        500;

      transition:
        background-color 0.2s ease,
        color 0.2s ease,
        transform 0.2s ease;
    }

    .continue-shopping:hover {
      background:
        #ffffff;

      color:
        var(--order-red);

      transform:
        translateY(-1px);
    }

    .continue-shopping i {
      font-size:
        10px;
    }

    .empty-order {
      display:
        none;

      width:
        min(100%, 700px);

      margin:
        60px auto;

      padding:
        65px 28px;

      text-align:
        center;

      background:
        #f7f7f7;
    }

    .empty-order.show {
      display:
        block;
    }

    .empty-order-icon {
      width:
        66px;

      height:
        66px;

      display:
        inline-flex;

      align-items:
        center;

      justify-content:
        center;

      margin-bottom:
        18px;

      border:
        1px solid var(--order-red);

      border-radius:
        50%;

      color:
        var(--order-red);

      font-size:
        23px;
    }

    .empty-order h1 {
      margin:
        0
        0
        9px;

      color:
        var(--order-red);

      font-size:
        25px;

      font-weight:
        700;
    }

    .empty-order p {
      margin:
        0
        auto
        25px;

      color:
        var(--order-muted);

      font-size:
        13px;

      line-height:
        1.6;
    }

    #cta-root,
    #footer-root {
      width:
        100%;
    }

    .view-order-page .cta-section {
      min-height:
        248px;

      display:
        flex;

      align-items:
        center;

      justify-content:
        center;

      padding:
        34px 30px;

      background:
        var(--order-red);
    }

    .view-order-page .cta-title {
      margin:
        0
        0
        24px;

      font-size:
        clamp(
          42px,
          5vw,
          62px
        );

      line-height:
        1;
    }

    .view-order-page .cta-form {
      width:
        100%;

      max-width:
        500px;

      gap:
        38px;

      margin-bottom:
        0;
    }

    .view-order-page .cta-input {
      width:
        300px;

      height:
        34px;

      padding:
        0 16px;

      font-size:
        11px;
    }

    .view-order-page .cta-btn {
      min-width:
        115px;

      height:
        34px;

      padding:
        0 18px;

      font-size:
        11px;
    }

    .view-order-page .cta-tagline {
      display:
        none;
    }

    .view-order-page .frgmnt-footer {
      padding:
        35px 50px;
    }

    .view-order-page .footer-list li {
      margin-bottom:
        2px;

      font-size:
        13px;

      line-height:
        1.45;
    }

    @media (max-width: 1100px) {
      .view-order-page {
        width:
          calc(100% - 60px);
      }

      .view-order-main {
        padding-right:
          30px;

        padding-left:
          30px;
      }

      .order-table-head,
      .order-table-body {
        grid-template-columns:
          minmax(0, 1fr)
          160px;

        gap:
          28px;
      }
    }

    @media (max-width: 820px) {
      body {
        padding-top:
          20px;
      }

      .view-order-page {
        width:
          calc(100% - 40px);
      }

      .order-table-head {
        grid-template-columns:
          1fr;
      }

      .order-table-head h2:last-child {
        display:
          none;
      }

      .order-table-body {
        grid-template-columns:
          1fr;
      }

      .order-summary {
        margin-top:
          18px;

        padding:
          20px 6px 0;

        border-top:
          1px solid #dedede;
      }

      .summary-row {
        max-width:
          310px;

        margin-left:
          auto;
      }
    }

    @media (max-width: 767.98px) {
      body {
        padding:
          0;
      }

      .view-order-page {
        width:
          100%;
      }

      .view-order-accent {
        height:
          12px;
      }

      .view-order-main {
        padding:
          0
          16px
          40px;
      }

      .view-order-content {
        min-height:
          350px;

        padding-top:
          30px;
      }

      .delivery-copy {
        font-size:
          12px;
      }

      .customer-row {
        grid-template-columns:
          62px
          12px
          minmax(0, 1fr);

        font-size:
          13px;
      }

      .customer-value {
        font-size:
          12px;
      }

      .order-table {
        margin-top:
          34px;
      }

      .order-table-head {
        padding-right:
          0;

        padding-left:
          0;
      }

      .order-item {
        grid-template-columns:
          72px
          minmax(0, 1fr);

        gap:
          13px;

        padding:
          13px 0;
      }

      .order-item-image {
        width:
          72px;

        height:
          78px;
      }

      .order-item-calculation {
        max-width:
          230px;

        column-gap:
          10px;
      }

      .summary-row {
        max-width:
          none;
      }

      .continue-shopping {
        width:
          100%;

        max-width:
          320px;
      }

      .view-order-page .cta-section {
        min-height:
          230px;

        padding:
          38px 16px;
      }

      .view-order-page .cta-title {
        font-size:
          38px;
      }

      .view-order-page .cta-form {
        width:
          100%;

        max-width:
          420px;

        gap:
          12px;
      }

      .view-order-page .cta-input,
      .view-order-page .cta-btn {
        width:
          100%;
      }

      .view-order-page .frgmnt-footer {
        padding:
          30px 20px;
      }
    }

    @media (max-width: 420px) {
      .order-item-calculation {
        column-gap:
          6px;

        font-size:
          9px;
      }

      .summary-row.total .summary-value {
        font-size:
          20px;
      }
    }
  </style>
</head>

<body>

  <div class="view-order-page">

    <div class="view-order-sheet">

      <div id="nav-root"></div>

      <div
        class="view-order-accent"
        aria-hidden="true"
      ></div>

      <main class="view-order-main">

        <section
          id="orderContent"
          class="view-order-content"
          hidden
        >

          <p class="delivery-copy">

            Estimated Delivery:

            <span id="estimatedDelivery">
              —
            </span>

          </p>

          <div
            class="customer-summary"
            aria-label="Customer information"
          >

            <div class="customer-row">

              <span class="customer-label">
                Name
              </span>

              <span class="customer-separator">
                :
              </span>

              <span
                id="customerName"
                class="customer-value"
              >
                —
              </span>

            </div>

            <div class="customer-row">

              <span class="customer-label">
                Phone
              </span>

              <span class="customer-separator">
                :
              </span>

              <span
                id="customerPhone"
                class="customer-value"
              >
                —
              </span>

            </div>

            <div class="customer-row">

              <span class="customer-label">
                Address
              </span>

              <span class="customer-separator">
                :
              </span>

              <span
                id="customerAddress"
                class="customer-value"
              >
                —
              </span>

            </div>

          </div>

          <section
            class="order-table"
            aria-label="Order products and subtotal"
          >

            <div class="order-table-head">

              <h2>
                Product
              </h2>

              <h2>
                Subtotal
              </h2>

            </div>

            <div class="order-table-body">

              <div
                id="orderItems"
                class="order-items"
              ></div>

              <aside
                class="order-summary"
                aria-label="Order totals"
              >

                <div class="summary-row">

                  <span>
                    Shipping:
                  </span>

                  <span
                    id="shippingValue"
                    class="summary-value"
                  >
                    $5
                  </span>

                </div>

                <div class="summary-row total">

                  <span>
                    Total:
                  </span>

                  <span
                    id="totalValue"
                    class="summary-value"
                  >
                    $0
                  </span>

                </div>

              </aside>

            </div>

            <div
              class="order-rule"
              aria-hidden="true"
            ></div>

            <div class="continue-row">

              <a
                href="shop.html"
                class="continue-shopping"
              >

                <i
                  class="fa-solid fa-arrow-left"
                ></i>

                Continue Shopping

              </a>

            </div>

          </section>

        </section>

        <section
          id="emptyOrder"
          class="empty-order"
        >

          <div class="empty-order-icon">

            <i
              class="fa-solid fa-receipt"
            ></i>

          </div>

          <h1>
            No order found
          </h1>

          <p>
            Your latest order will appear here
            after checkout.
          </p>

          <a
            href="shop.html"
            class="continue-shopping"
          >

            <i
              class="fa-solid fa-arrow-left"
            ></i>

            Continue Shopping

          </a>

        </section>

      </main>

      <div id="cta-root"></div>

      <div id="footer-root"></div>

    </div>

  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
  ></script>

  <script
    src="../assets/js/components.js"
  ></script>

  <script
    src="../assets/js/main.js"
  ></script>

  <script>

    const ORDER_STORAGE_KEYS = [
      "frgmnt_order",
      "frgmntOrder",
      "lastOrder",
      "order"
    ];

    const CART_STORAGE_KEYS = [
      "frgmnt_cart",
      "frgmntCart",
      "cart"
    ];

    const DEFAULT_PRODUCT_IMAGE =
      "../assets/images/shop/product/FORM_TANK.png";

    const orderContent =
      document.getElementById(
        "orderContent"
      );

    const emptyOrder =
      document.getElementById(
        "emptyOrder"
      );

    const orderItems =
      document.getElementById(
        "orderItems"
      );

    const estimatedDelivery =
      document.getElementById(
        "estimatedDelivery"
      );

    const customerName =
      document.getElementById(
        "customerName"
      );

    const customerPhone =
      document.getElementById(
        "customerPhone"
      );

    const customerAddress =
      document.getElementById(
        "customerAddress"
      );

    const shippingValue =
      document.getElementById(
        "shippingValue"
      );

    const totalValue =
      document.getElementById(
        "totalValue"
      );

    function safeParse(
      value
    ) {
      try {
        return value
          ? JSON.parse(
              value
            )
          : null;

      } catch (error) {
        console.error(
          "Cannot parse data:",
          error
        );

        return null;
      }
    }

    function readFirstStorageValue(
      keys
    ) {
      for (
        const key of keys
      ) {
        const rawValue =
          localStorage.getItem(
            key
          );

        if (!rawValue) {
          continue;
        }

        const parsedValue =
          safeParse(
            rawValue
          );

        if (parsedValue) {
          return parsedValue;
        }
      }

      return null;
    }

    function normalizeItems(
      items
    ) {
      if (
        !Array.isArray(
          items
        )
      ) {
        return [];
      }

      return items
        .filter(
          (item) =>
            item &&
            typeof item ===
              "object"
        )
        .map(
          (
            item,
            index
          ) => ({
            id:
              item.id ||
              `order-item-${index}`,

            name:
              item.name ||
              item.title ||
              "FRGMNT Product",

            price:
              Number(
                item.price
              ) || 0,

            image:
              item.image ||
              item.img ||
              DEFAULT_PRODUCT_IMAGE,

            quantity:
              Math.max(
                1,
                Number(
                  item.quantity ??
                  item.qty
                ) || 1
              ),

            size:
              item.size ||
              "M",

            color:
              item.color ||
              "Red"
          })
        );
    }

    function getOrderData() {
      const savedOrder =
        readFirstStorageValue(
          ORDER_STORAGE_KEYS
        );

      if (savedOrder) {

        if (
          Array.isArray(
            savedOrder
          )
        ) {
          return {
            items:
              normalizeItems(
                savedOrder
              ),

            customer: {},

            shipping:
              5
          };
        }

        const items =
          savedOrder.items ||
          savedOrder.products ||
          savedOrder.cart ||
          savedOrder.cartItems ||
          savedOrder.orderItems ||
          [];

        const customer =
          savedOrder.customer ||
          savedOrder.shippingInfo ||
          savedOrder.billingInfo ||
          savedOrder.user ||
          {};

        return {
          ...savedOrder,

          items:
            normalizeItems(
              items
            ),

          customer:
            customer
        };
      }

      const savedCart =
        readFirstStorageValue(
          CART_STORAGE_KEYS
        );

      if (
        Array.isArray(
          savedCart
        ) &&
        savedCart.length > 0
      ) {
        return {
          items:
            normalizeItems(
              savedCart
            ),

          customer: {},

          shipping:
            5
        };
      }

      return null;
    }

    function formatMoney(
      value
    ) {
      const amount =
        Number(
          value
        ) || 0;

      const hasDecimals =
        !Number.isInteger(
          amount
        );

      return `$${amount.toLocaleString(
        "en-US",
        {
          minimumFractionDigits:
            hasDecimals
              ? 2
              : 0,

          maximumFractionDigits:
            2
        }
      )}`;
    }

    function formatDeliveryRange(
      order
    ) {
      if (
        order.estimatedDelivery
      ) {
        return order.estimatedDelivery;
      }

      if (
        order.deliveryDate
      ) {
        return order.deliveryDate;
      }

      const start =
        new Date();

      const end =
        new Date();

      start.setDate(
        start.getDate() +
        5
      );

      end.setDate(
        end.getDate() +
        7
      );

      const startMonth =
        start.toLocaleDateString(
          "en-US",
          {
            month:
              "long"
          }
        );

      const endMonth =
        end.toLocaleDateString(
          "en-US",
          {
            month:
              "long"
          }
        );

      if (
        startMonth ===
        endMonth
      ) {
        return `${startMonth} ${start.getDate()}–${end.getDate()}`;
      }

      return `${startMonth} ${start.getDate()} – ${endMonth} ${end.getDate()}`;
    }

    function getCustomerValue(
      customer,
      keys,
      fallback = "—"
    ) {
      for (
        const key of keys
      ) {
        if (
          customer &&
          customer[key]
        ) {
          return customer[key];
        }
      }

      return fallback;
    }

    function createTextElement(
      tagName,
      className,
      text
    ) {
      const element =
        document.createElement(
          tagName
        );

      if (className) {
        element.className =
          className;
      }

      element.textContent =
        text;

      return element;
    }

    function renderOrderItems(
      items
    ) {
      orderItems.replaceChildren();

      items.forEach(
        (item) => {

          const article =
            document.createElement(
              "article"
            );

          article.className =
            "order-item";

          const imageWrap =
            document.createElement(
              "div"
            );

          imageWrap.className =
            "order-item-image";

          const image =
            document.createElement(
              "img"
            );

          image.src =
            item.image;

          image.alt =
            item.name;

          image.loading =
            "lazy";

          image.onerror =
            function () {
              this.src =
                DEFAULT_PRODUCT_IMAGE;
            };

          imageWrap.appendChild(
            image
          );

          const copy =
            document.createElement(
              "div"
            );

          copy.className =
            "order-item-copy";

          const productName =
            createTextElement(
              "h3",
              "order-item-name",
              item.name
            );

          const calculation =
            document.createElement(
              "div"
            );

          calculation.className =
            "order-item-calculation";

          calculation.appendChild(
            createTextElement(
              "span",
              "",
              item.quantity
            )
          );

          calculation.appendChild(
            createTextElement(
              "span",
              "",
              "×"
            )
          );

          calculation.appendChild(
            createTextElement(
              "span",
              "",
              item.size
            )
          );

          calculation.appendChild(
            createTextElement(
              "span",
              "",
              "×"
            )
          );

          calculation.appendChild(
            createTextElement(
              "strong",
              "",
              formatMoney(
                item.price *
                item.quantity
              )
            )
          );

          copy.append(
            productName,
            calculation
          );

          article.append(
            imageWrap,
            copy
          );

          orderItems.appendChild(
            article
          );
        }
      );
    }

    function renderOrder() {
      const order =
        getOrderData();

      if (
        !order ||
        !Array.isArray(
          order.items
        ) ||
        order.items.length === 0
      ) {
        orderContent.hidden =
          true;

        emptyOrder.classList.add(
          "show"
        );

        return;
      }

      orderContent.hidden =
        false;

      emptyOrder.classList.remove(
        "show"
      );

      const customer =
        order.customer ||
        {};

      const subtotal =
        order.items.reduce(
          (
            sum,
            item
          ) =>
            sum +
            item.price *
            item.quantity,
          0
        );

      const shipping =
        5;

      const discount =
        Number(
          order.discount ??
          order.discountAmount ??
          0
        ) || 0;

      const finalTotal =
        Math.max(
          0,
          subtotal +
          shipping -
          discount
        );

      estimatedDelivery.textContent =
        formatDeliveryRange(
          order
        );

      customerName.textContent =
        getCustomerValue(
          customer,
          [
            "name",
            "fullName",
            "fullname",
            "customerName"
          ]
        );

      customerPhone.textContent =
        getCustomerValue(
          customer,
          [
            "phone",
            "phoneNumber",
            "telephone"
          ]
        );

      customerAddress.textContent =
        getCustomerValue(
          customer,
          [
            "address",
            "shippingAddress",
            "fullAddress"
          ]
        );

      shippingValue.textContent =
        formatMoney(
          shipping
        );

      totalValue.textContent =
        formatMoney(
          finalTotal
        );

      renderOrderItems(
        order.items
      );
    }

    renderOrder();

    window.addEventListener(
      "pageshow",
      () => {
        renderOrder();
      }
    );

    window.addEventListener(
      "storage",
      () => {
        renderOrder();
      }
    );
  </script>

</body>

</html>
