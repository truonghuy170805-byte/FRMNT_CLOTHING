<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cart - FRGMNT</title>

  <meta name="description" content="Review your FRGMNT shopping cart before checkout.">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="../assets/css/style.css">

  <link rel="stylesheet" href="../assets/css/responsive.css">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;

      background: #ffffff;
      color: #111111;

      font-family: "Poppins", sans-serif;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button,
    input {
      font-family: "Poppins", sans-serif;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #nav-root,
    #nav-root>* {
      margin-bottom: 0 !important;

      border: 0 !important;
      border-bottom: 0 !important;

      box-shadow: none !important;
    }

    #cta-root,
    #footer-root {
      width: 100%;
    }

    .cart-page {
      width: 100%;
      min-height: 100vh;

      background: #ffffff;
    }

    .cart-hero {
      width: 100%;
      height: auto;
      overflow: hidden;
    }

    .cart-hero img {
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    .cart-main {
      width: 100%;
      max-width: 1380px;

      margin: 0 auto;

      padding:
        72px 70px 82px;
    }

    .cart-heading {
      display: flex;
      align-items: center;

      gap: 24px;

      margin-bottom: 48px;
    }

    .cart-heading-icon {
      color: #000000;

      font-size: 65px;
      line-height: 1;
    }

    .cart-heading-text h1 {
      margin: 0 0 6px;

      color: #000000;

      font-size: 44px;
      font-weight: 800;
      line-height: 1;

      text-transform: uppercase;
    }

    .cart-heading-text p {
      margin: 0;

      color: #333333;

      font-size: 14px;
      font-weight: 400;
    }

    .cart-table-header {
      display: grid;

      grid-template-columns:
        minmax(0, 1.7fr) minmax(120px, 0.65fr) minmax(170px, 0.85fr) minmax(120px, 0.6fr);

      align-items: center;

      min-height: 68px;

      padding:
        0 42px;

      background: #950000;
      color: #ffffff;
    }

    .cart-table-header span {
      font-size: 17px;
      font-weight: 700;
    }

    .cart-table-header span:not(:first-child) {
      text-align: center;
    }

    .cart-item {
      display: grid;

      grid-template-columns:
        minmax(0, 1.7fr) minmax(120px, 0.65fr) minmax(170px, 0.85fr) minmax(120px, 0.6fr);

      align-items: center;

      min-height: 145px;

      padding:
        20px 42px;

      border-bottom:
        6px solid #950000;
    }

    .cart-product-cell {
      min-width: 0;

      display: grid;

      grid-template-columns:
        25px 96px minmax(0, 1fr);

      align-items: center;

      gap: 18px;
    }

    .cart-remove {
      width: 25px;
      height: 25px;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 0;

      border: 0;
      border-radius: 50%;

      background: transparent;
      color: #111111;

      font-size: 13px;
    }

    .cart-remove:hover {
      background: #950000;
      color: #ffffff;
    }

    .cart-product-image-link {
      width: 96px;
      height: 96px;

      display: block;

      overflow: hidden;

      background: #eeeeee;
    }

    .cart-product-image {
      width: 100%;
      height: 100%;

      object-fit: contain;
      object-position: center;
    }

    .cart-product-info {
      min-width: 0;
    }

    .cart-product-name {
      display: inline-block;

      margin-bottom: 7px;

      color: #111111;

      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;

      text-transform: uppercase;
    }

    .cart-product-name:hover {
      color: #950000;
    }

    .cart-product-meta {
      margin: 0;

      color: #555555;

      font-size: 10px;
      line-height: 1.5;
    }

    .cart-price,
    .cart-item-total {
      color: #111111;

      font-size: 18px;
      font-weight: 700;

      text-align: center;
    }

    .cart-quantity-wrapper {
      display: flex;
      justify-content: center;
    }

    .cart-quantity {
      width: 118px;
      height: 48px;

      display: grid;

      grid-template-columns:
        36px 1fr 36px;

      align-items: center;

      border:
        2px solid #222222;

      background: #ffffff;
    }

    .cart-quantity button {
      width: 100%;
      height: 100%;

      padding: 0;

      border: 0;

      background: transparent;
      color: #950000;

      font-size: 16px;
    }

    .cart-quantity button:hover {
      background: #950000;
      color: #ffffff;
    }

    .cart-quantity-value {
      color: #111111;

      font-size: 16px;
      font-weight: 500;

      text-align: center;
    }

    .cart-empty {
      display: none;

      min-height: 340px;

      align-items: center;
      justify-content: center;

      text-align: center;
    }

    .cart-empty.show {
      display: flex;
    }

    .cart-empty i {
      margin-bottom: 16px;

      color: #950000;

      font-size: 55px;
    }

    .cart-empty h2 {
      margin: 0 0 8px;

      font-size: 27px;
      font-weight: 700;
    }

    .cart-empty p {
      margin: 0 0 22px;

      color: #777777;

      font-size: 14px;
    }

    .cart-empty-link {
      min-width: 180px;
      height: 46px;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      background: #950000;
      color: #ffffff;

      font-size: 13px;
    }

    .cart-empty-link:hover {
      background: #720000;
      color: #ffffff;
    }

    .cart-bottom {
      display: grid;

      grid-template-columns:
        minmax(0, 1fr) 460px;

      align-items: start;

      gap: 60px;

      margin-top: 54px;
    }

    .continue-shopping {
      min-width: 220px;
      height: 48px;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      gap: 8px;

      padding:
        0 24px;

      background: #950000;
      color: #ffffff;

      font-size: 12px;
      font-weight: 500;
    }

    .continue-shopping:hover {
      background: #720000;
      color: #ffffff;
    }

    .cart-summary-box {
      padding:
        30px 45px;

      background: #dddddd;
    }

    .cart-summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;

      gap: 20px;

      margin-bottom: 28px;

      color: #222222;

      font-size: 17px;
    }

    .cart-summary-row:last-child {
      margin-bottom: 0;
    }

    .cart-summary-row.total strong {
      color: #950000;

      font-size: 20px;
      font-weight: 700;
    }

    .checkout-button {
      width: 100%;
      min-height: 64px;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      margin-top: 28px;

      background: #950000;
      color: #ffffff;

      font-size: 15px;
      font-weight: 700;

      text-transform: uppercase;
    }

    .checkout-button:hover {
      background: #720000;
      color: #ffffff;
    }

    @media (max-width: 991.98px) {
      .cart-main {
        padding:
          55px 28px 65px;
      }

      .cart-table-header,
      .cart-item {
        grid-template-columns:
          minmax(0, 1.5fr) 100px 145px 100px;

        padding-left: 20px;
        padding-right: 20px;
      }

      .cart-product-cell {
        grid-template-columns:
          22px 76px minmax(0, 1fr);

        gap: 12px;
      }

      .cart-product-image-link {
        width: 76px;
        height: 82px;
      }

      .cart-bottom {
        grid-template-columns: 1fr;
      }

      .cart-summary {
        width: 100%;
        max-width: 520px;

        margin-left: auto;
      }
    }

    @media (max-width: 767.98px) {
      .cart-hero {
        height: 155px;
      }

      .cart-main {
        padding:
          40px 16px 55px;
      }

      .cart-heading {
        gap: 16px;
        margin-bottom: 35px;
      }

      .cart-heading-icon {
        font-size: 46px;
      }

      .cart-heading-text h1 {
        font-size: 32px;
      }

      .cart-heading-text p {
        font-size: 12px;
      }

      .cart-table-header {
        display: none;
      }

      .cart-item {
        grid-template-columns: 1fr;

        gap: 18px;

        padding:
          22px 8px;

        border-bottom-width: 4px;
      }

      .cart-product-cell {
        grid-template-columns:
          22px 82px minmax(0, 1fr);
      }

      .cart-product-image-link {
        width: 82px;
        height: 88px;
      }

      .cart-price,
      .cart-quantity-wrapper,
      .cart-item-total {
        display: flex;
        align-items: center;
        justify-content: space-between;

        padding:
          0 12px;

        text-align: left;
      }

      .cart-price::before {
        content: "Price";

        font-size: 13px;
        font-weight: 500;
      }

      .cart-quantity-wrapper::before {
        content: "Quantity";

        font-size: 13px;
        font-weight: 500;
      }

      .cart-item-total::before {
        content: "Total";

        font-size: 13px;
        font-weight: 500;
      }

      .cart-bottom {
        gap: 35px;
        margin-top: 40px;
      }

      .continue-shopping {
        width: 100%;
      }

      .cart-summary {
        max-width: none;
      }
    }

    @media (max-width: 479.98px) {
      .cart-product-cell {
        grid-template-columns:
          20px 70px minmax(0, 1fr);

        gap: 9px;
      }

      .cart-product-image-link {
        width: 70px;
        height: 78px;
      }

      .cart-product-name {
        font-size: 13px;
      }

      .cart-summary-box {
        padding:
          25px 26px;
      }
    }
  </style>
</head>

<body>

  <div class="cart-page">

    <div id="nav-root"></div>

    <main>

      <section class="cart-hero" aria-label="Shopping cart banner">
        <img src="../assets/images/cart/banner.png" alt="FRGMNT cart banner">
      </section>

      <section class="cart-main">

        <div class="cart-heading">

          <div class="cart-heading-icon">
            <i class="fa-solid fa-cart-shopping"></i>
          </div>

          <div class="cart-heading-text">

            <h1>
              Cart
            </h1>

            <p>
              Review your items before checkout.
            </p>

          </div>

        </div>

        <div class="cart-table">

          <div class="cart-table-header">

            <span>
              Products
            </span>

            <span>
              Price
            </span>

            <span>
              Quantity
            </span>

            <span>
              Total
            </span>

          </div>

          <div id="cartItems" class="cart-items"></div>

          <div id="cartEmpty" class="cart-empty">

            <div>

              <i class="fa-solid fa-cart-shopping"></i>

              <h2>
                Your cart is empty
              </h2>

              <p>
                Add products from the shop to continue.
              </p>

              <a href="shop.html" class="cart-empty-link">
                Go To Shop
              </a>

            </div>

          </div>

        </div>

        <div id="cartBottom" class="cart-bottom">

          <div>

            <a href="shop.html" class="continue-shopping">
              <i class="fa-solid fa-arrow-left"></i>

              Continue Shopping
            </a>

          </div>

          <aside class="cart-summary">

            <div class="cart-summary-box">

              <div class="cart-summary-row">

                <span>
                  Subtotal
                </span>

                <span id="cartSubtotal">
                  $0
                </span>

              </div>

              <div class="cart-summary-row">

                <span>
                  Shipping
                </span>

                <span id="cartShipping">
                  $0
                </span>

              </div>

              <div class="cart-summary-row total">

                <span>
                  Total
                </span>

                <strong id="cartTotal">
                  $0
                </strong>

              </div>

            </div>

            <a href="checkout.html" class="checkout-button">
              Check Out
            </a>

          </aside>

        </div>

      </section>

    </main>

    <div id="cta-root"></div>
    <div id="footer-root"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/main.js"></script>

  <script>

    const CART_STORAGE_KEY =
      "frgmnt_cart";

    const SHIPPING_PRICE =
      10;

    const cartItems =
      document.getElementById(
        "cartItems"
      );

    const cartEmpty =
      document.getElementById(
        "cartEmpty"
      );

    const cartBottom =
      document.getElementById(
        "cartBottom"
      );

    const cartSubtotal =
      document.getElementById(
        "cartSubtotal"
      );

    const cartShipping =
      document.getElementById(
        "cartShipping"
      );

    const cartTotal =
      document.getElementById(
        "cartTotal"
      );

    function formatMoney(value) {
      return `$${(
        Number(value) || 0
      ).toLocaleString("en-US")}`;
    }

    function getProductUrl(product) {
      if (product.detailUrl) {
        return product.detailUrl;
      }

      if (product.id === "p01") {
        return "product.html?id=p01";
      }

      return "shop.html";
    }

    function readCart() {
      try {
        const saved =
          localStorage.getItem(
            CART_STORAGE_KEY
          );

        const parsed =
          saved
            ? JSON.parse(saved)
            : [];

        return Array.isArray(parsed)
          ? parsed
          : [];

      } catch (error) {
        console.error(
          "Cannot read cart:",
          error
        );

        return [];
      }
    }

    function saveCart(cart) {
      localStorage.setItem(
        CART_STORAGE_KEY,
        JSON.stringify(cart)
      );

      window.dispatchEvent(
        new CustomEvent(
          "frgmnt-cart-updated",
          {
            detail: {
              cart
            }
          }
        )
      );

      if (
        typeof updateCartCount ===
        "function"
      ) {
        updateCartCount();
      }
    }

    function renderCart() {
      const cart =
        readCart();

      const hasItems =
        cart.length > 0;

      cartItems.style.display =
        hasItems
          ? "block"
          : "none";

      cartEmpty.classList.toggle(
        "show",
        !hasItems
      );

      cartBottom.style.display =
        hasItems
          ? "grid"
          : "none";

      if (!hasItems) {
        cartItems.innerHTML =
          "";

        updateSummary([]);

        return;
      }

      cartItems.innerHTML =
        cart
          .map((product, index) => {
            const name =
              product.name ||
              "Product";

            const price =
              Number(
                product.price
              ) || 0;

            const quantity =
              Math.max(
                1,
                Number(
                  product.qty || product.quantity
                ) || 1
              );

            const image =
              product.image ||
              product.img ||
              "../assets/images/shop/product/FORM_TANK.png";

            const color =
              product.color ||
              "Red";

            const size =
              product.size ||
              "M";

            const itemTotal =
              price *
              quantity;

            const productUrl =
              getProductUrl(
                product
              );

            return `
              <article class="cart-item">

                <div class="cart-product-cell">

                  <button
                    type="button"
                    class="cart-remove"
                    data-remove-index="${index}"
                    aria-label="Remove ${name}"
                  >
                    <i class="fa-solid fa-xmark"></i>
                  </button>

                  <a
                    href="${productUrl}"
                    class="cart-product-image-link"
                  >
                    <img
                      src="${image}"
                      alt="${name}"
                      class="cart-product-image"
                    >
                  </a>

                  <div class="cart-product-info">

                    <a
                      href="${productUrl}"
                      class="cart-product-name"
                    >
                      ${name}
                    </a>

                    <p class="cart-product-meta">
                      Color: ${color} · Size: ${size}
                    </p>

                  </div>

                </div>

                <div class="cart-price">
                  ${formatMoney(price)}
                </div>

                <div class="cart-quantity-wrapper">

                  <div class="cart-quantity">

                    <button
                      type="button"
                      data-cart-index="${index}"
                      data-action="decrease"
                      aria-label="Decrease ${name} quantity"
                    >
                      −
                    </button>

                    <span class="cart-quantity-value">
                      ${quantity}
                    </span>

                    <button
                      type="button"
                      data-cart-index="${index}"
                      data-action="increase"
                      aria-label="Increase ${name} quantity"
                    >
                      +
                    </button>

                  </div>

                </div>

                <div class="cart-item-total">
                  ${formatMoney(itemTotal)}
                </div>

              </article>
            `;
          })
          .join("");

      updateSummary(
        cart
      );

      bindCartEvents();
    }

    function updateSummary(cart) {
      const subtotal =
        cart.reduce(
          (sum, product) => {
            const price =
              Number(
                product.price
              ) || 0;

            const quantity =
              Math.max(
                1,
                Number(
                  product.qty || product.quantity
                ) || 1
              );

            return (
              sum +
              price *
              quantity
            );
          },
          0
        );

      const shipping =
        subtotal > 0
          ? SHIPPING_PRICE
          : 0;

      const total =
        subtotal +
        shipping;

      cartSubtotal.textContent =
        formatMoney(
          subtotal
        );

      cartShipping.textContent =
        formatMoney(
          shipping
        );

      cartTotal.textContent =
        formatMoney(
          total
        );
    }

    function updateQuantity(
      index,
      amount
    ) {
      const cart =
        readCart();

      const product =
        cart[index];

      if (!product) {
        return;
      }

      const currentQuantity =
        Math.max(
          1,
          Number(
            product.qty || product.quantity
          ) || 1
        );

      const newQuantity =
        currentQuantity +
        amount;

      if (newQuantity < 1) {
        return;
      }

      if ('qty' in product) {
        product.qty = newQuantity;
      } else {
        product.quantity = newQuantity;
      }

      saveCart(
        cart
      );

      renderCart();
    }

    function removeProduct(index) {
      const cart =
        readCart();

      if (!cart[index]) {
        return;
      }

      cart.splice(
        index,
        1
      );

      saveCart(
        cart
      );

      renderCart();
    }

    function bindCartEvents() {
      document
        .querySelectorAll(
          "[data-remove-index]"
        )
        .forEach((button) => {
          button.addEventListener(
            "click",
            () => {
              removeProduct(
                Number(
                  button.dataset
                    .removeIndex
                )
              );
            }
          );
        });

      document
        .querySelectorAll(
          "[data-action]"
        )
        .forEach((button) => {
          button.addEventListener(
            "click",
            () => {
              const index =
                Number(
                  button.dataset
                    .cartIndex
                );

              const amount =
                button.dataset.action ===
                  "increase"
                  ? 1
                  : -1;

              updateQuantity(
                index,
                amount
              );
            }
          );
        });
    }

    window.addEventListener(
      "storage",
      (event) => {
        if (
          event.key ===
          CART_STORAGE_KEY
        ) {
          renderCart();
        }
      }
    );

    window.addEventListener(
      "pageshow",
      renderCart
    );

    renderCart();
  </script>

</body>

</html>
